<!DOCTYPE html>

    />
    <link rel="stylesheet" href="/home.css" />

  </head>
  <body class="bazi-split-body">
    <div class="site-canvas bazi-split-canvas">
      <div class="bazi-split-grain" aria-hidden="true"></div>

      <a class="brand-lockup layer" href="/home.html" aria-label="青筮记首页">
        <img class="brand-app-logo" src="/assets/applogo.png" alt="" />
        <img class="brand-word-logo" src="/assets/logo-horizontal.png" alt="青筮记" />
      </a>

      <header class="site-header layer">
        <a class="nav-link" href="/home.html">首页</a>
        <a class="nav-link" href="/divination.html">占卜</a>
        <a class="nav-link active" href="/bazi.html">八字</a>
        <a class="nav-link" href="/huangdao.html">青筮黄道</a>
        <a class="nav-link" href="/courses.html">课程</a>
        <a class="nav-link" href="/profile.html">记录</a>
        <a class="nav-link" href="/about.html">关于</a>
      </header>

      <div class="login-button layer home-login-entry rebuilt-home-account" data-account-entry></div>

      <main class="bazi-split-stage">
        <span class="bazi-split-divider" aria-hidden="true"></span>

        <a class="bazi-option bazi-option-left" href="/bazi-chart.html" aria-label="进入四柱八字排盘页">
          <div class="bazi-panel-bg" aria-hidden="true"></div>
          <div class="bazi-panel-shade" aria-hidden="true"></div>
          <div class="bazi-panel-rings" aria-hidden="true"></div>
          <div class="bazi-panel-copy bazi-panel-copy-left">
            <img class="bazi-calligraphy bazi-calligraphy-left" src="/assets/bazi-split-bazi-calligraphy.png" alt="" />
            <div class="bazi-copy-block">
              <p class="bazi-subhead">四柱八字</p>
              <p class="bazi-description">
                以生辰八字为根基，排演四柱命盘，<br />
                解析五行生克、十神格局，洞察命运<br />
                轨迹，指引人生方向。
              </p>
            </div>
          </div>
        </a>

        <a class="bazi-option bazi-option-right" href="/compatibility.html" aria-label="进入双人合盘分析页">
          <div class="bazi-panel-bg" aria-hidden="true"></div>
          <div class="bazi-panel-shade" aria-hidden="true"></div>
          <div class="bazi-panel-rings" aria-hidden="true"></div>
          <div class="bazi-panel-copy bazi-panel-copy-right">
            <div class="bazi-copy-block bazi-copy-block-right">
              <p class="bazi-description">
                合参双方命盘，解析五行互补，<br />
                十神互动与缘分深浅，洞悉情感<br />
                契合与关系走向。
              </p>
              <p class="bazi-subhead bazi-subhead-right">双人合盘</p>
            </div>
            <img class="bazi-calligraphy bazi-calligraphy-right" src="/assets/bazi-split-hepan-calligraphy.png" alt="" />
          </div>
        </a>
      </main>
    </div>

    <script type="module" src="/account-menu.js"></script>
