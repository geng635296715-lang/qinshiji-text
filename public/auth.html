<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>青筮记 · 登录注册</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/dark-theme.css" />
  </head>
  <body class="qs-dark-page">
    <div class="app-shell">
      <header class="app-header">
        <div class="app-title-group">
          <p class="section-kicker">青筮记 · 用户体系</p>
          <h1>登录 / 注册</h1>
          <p class="muted">登录后可保存八字档案、历史起卦记录和 AI 咨询记录，并在个人中心统一查看。</p>
        </div>
        <div class="mini-list">
          <a class="chip" href="/home.html">返回首页</a>
          <a class="chip" href="/profile.html">个人中心</a>
        </div>
      </header>

      <section class="auth-grid">
        <form id="login-form" class="form-card">
          <div class="section-title">
            <div>
              <p class="section-kicker">已有账号</p>
              <h2>登录</h2>
            </div>
          </div>
          <div class="field">
            <label for="login-account">邮箱或用户名</label>
            <input id="login-account" type="text" placeholder="请输入邮箱或用户名" />
          </div>
          <div class="field">
            <label for="login-password">密码</label>
            <input id="login-password" type="password" placeholder="请输入密码" />
          </div>
          <div class="button-row">
            <button class="primary-btn" type="submit">登录</button>
          </div>
          <div id="login-message" class="info-note">登录成功后会自动进入个人中心。</div>
        </form>

        <form id="register-form" class="form-card">
          <div class="section-title">
            <div>
              <p class="section-kicker">新用户</p>
              <h2>注册</h2>
            </div>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="register-email">邮箱</label>
              <input id="register-email" type="email" placeholder="例如 demo@example.com" />
            </div>
            <div class="field">
              <label for="register-username">用户名</label>
              <input id="register-username" type="text" placeholder="例如 qingshiji-user" />
            </div>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="register-display-name">显示名称</label>
              <input id="register-display-name" type="text" placeholder="例如 青筮记体验用户" />
            </div>
            <div class="field">
              <label for="register-password">密码</label>
              <input id="register-password" type="password" placeholder="至少 6 位" />
            </div>
          </div>
          <div class="button-row">
            <button class="primary-btn" type="submit">注册并登录</button>
          </div>
          <div id="register-message" class="info-note">注册成功后会自动登录并进入个人中心。</div>
        </form>
      </section>
    </div>

    <script src="/account-menu.js" type="module"></script>
    <script src="/auth.js" type="module"></script>
  </body>
</html>
